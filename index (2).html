<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuoteBot</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.new-chat{
background:#4f46e5;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
}

.new-chat:hover{
background:#4338ca;
}

.category{
background:#1e293b;
padding:10px;
border-radius:8px;
margin:5px 0;
cursor:pointer;
}

.category:hover{
background:#334155;
}

/* CHAT AREA */

.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
border-bottom:1px solid #1e293b;
font-size:18px;
}

.messages{
flex:1;
padding:25px;
overflow-y:auto;
}

/* BOT WELCOME */

.bot-placeholder{
text-align:center;
margin-top:120px;
transition:0.5s;
}

.bot-placeholder img{
width:140px;
}

.blur{
opacity:0.2;
filter:blur(6px);
}

/* MESSAGE */

.message{
display:flex;
margin-bottom:18px;
}

.bot{
align-items:flex-start;
}

.user{
justify-content:flex-end;
}

.bubble{
padding:12px 16px;
border-radius:12px;
max-width:60%;
}

.bot .bubble{
background:#1e293b;
}

.user .bubble{
background:#4f46e5;
}

/* AVATAR */

.avatar{
width:32px;
height:32px;
margin-right:8px;
border-radius:50%;
}

/* INPUT */

.input-area{
padding:15px;
border-top:1px solid #1e293b;
display:flex;
}

.input-area input{
flex:1;
background:#020617;
border:none;
padding:12px;
color:white;
border-radius:8px;
outline:none;
}

.input-area button{
margin-left:10px;
background:#4f46e5;
border:none;
padding:12px 18px;
color:white;
border-radius:8px;
cursor:pointer;
}

.input-area button:hover{
background:#4338ca;
}

/* TYPING ANIMATION */

.typing{
display:flex;
margin-top:10px;
}

.dot{
height:8px;
width:8px;
background:#94a3b8;
border-radius:50%;
margin-right:4px;
animation:bounce 1.3s infinite;
}

.dot:nth-child(2){
animation-delay:.2s;
}

.dot:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>QuoteBot</h2>

<div class="new-chat" onclick="location.reload()">New Chat</div>

<div class="category" onclick="quick('motivate me')">Motivation</div>
<div class="category" onclick="quick('inspire me')">Inspiration</div>
<div class="category" onclick="quick('tell me something funny')">Humor</div>
<div class="category" onclick="quick('give me a love quote')">Love</div>

</div>


<!-- CHAT AREA -->

<div class="chat-area">

<div class="header">
Quotes Recommendation Bot
</div>

<div class="messages" id="messages">

<div class="bot-placeholder" id="placeholder">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<p>Ask me for motivation, inspiration, love or humor quotes.</p>

</div>

</div>

<div class="input-area">

<input 
id="input"
placeholder="Send a message..."
onkeypress="if(event.key==='Enter') send()"
>

<button onclick="send()">Send</button>

</div>

</div>


<script>

const avatar="https://cdn-icons-png.flaticon.com/512/4712/4712109.png";

function addMessage(text,type){

const msg=document.createElement("div");
msg.className="message "+type;

if(type==="bot"){

const img=document.createElement("img");
img.src=avatar;
img.className="avatar";
msg.appendChild(img);

}

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.innerText=text;

msg.appendChild(bubble);

document.getElementById("messages").appendChild(msg);

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight;

}

function typing(){

const box=document.createElement("div");
box.className="typing";
box.id="typing";

box.innerHTML=
'<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

document.getElementById("messages").appendChild(box);

}

function stopTyping(){

const t=document.getElementById("typing");
if(t) t.remove();

}

function send(){

let input=document.getElementById("input");
let text=input.value.trim();

if(text==="") return;

document.getElementById("placeholder").classList.add("blur");

addMessage(text,"user");

input.value="";

typing();

fetch("http://localhost:5005/webhooks/rest/webhook",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
sender:"user",
message:text
})

})

.then(res=>res.json())

.then(data=>{

stopTyping();

if(data.length>0){

addMessage(data[0].text,"bot");

}

})

.catch(()=>{

stopTyping();
addMessage("Server error.","bot");

});

}

function quick(text){

document.getElementById("input").value=text;
send();

}

</script>

</body>
</html>
